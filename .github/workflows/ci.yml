name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r backend/requirements-dev.txt -r mock_device/requirements.txt
      - run: ruff format --check .
      - run: ruff check .
      - run: mypy
      - run: pytest --cov-report=xml
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test

  firmware:
    runs-on: ubuntu-latest
    env:
      WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-arduino-cli@v2
      - run: arduino-cli core update-index
      - run: arduino-cli core install esp32:esp32
      - run: arduino-cli lib install ArduinoJson DallasTemperature OneWire PubSubClient
      - name: Compile plaintext Wokwi firmware
        run: arduino-cli compile --fqbn esp32:esp32:esp32 --build-path build/wokwi firmware/esp32_mqtt
      - name: Compile verified-TLS physical firmware
        run: |
          cp firmware/esp32_mqtt/feeder_secrets.example.h firmware/esp32_mqtt/feeder_secrets.h
          arduino-cli compile --fqbn esp32:esp32:esp32 --build-path /tmp/esp32-tls firmware/esp32_mqtt
      - name: Run Wokwi sensor and actuator scenario
        if: env.WOKWI_CLI_TOKEN != ''
        uses: wokwi/wokwi-ci-action@v1
        with:
          token: ${{ secrets.WOKWI_CLI_TOKEN }}
          path: simulation/esp32-mqtt
          timeout: 45000
          scenario: verify_feeder.yaml
      - name: Report optional Wokwi runtime test
        if: env.WOKWI_CLI_TOKEN == ''
        run: echo "Wokwi runtime test skipped; configure the WOKWI_CLI_TOKEN repository secret to enable it."

  closed-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect optional Wokwi token
        id: wokwi
        run: |
          if [[ -n "$WOKWI_CLI_TOKEN" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: arduino/setup-arduino-cli@v2
        if: steps.wokwi.outputs.enabled == 'true'
      - name: Install ESP32 compiler and firmware libraries
        if: steps.wokwi.outputs.enabled == 'true'
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli lib install ArduinoJson DallasTemperature OneWire PubSubClient
      - uses: actions/setup-node@v4
        if: steps.wokwi.outputs.enabled == 'true'
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        if: steps.wokwi.outputs.enabled == 'true'
        with:
          version: 11
      - name: Install dashboard browser test
        if: steps.wokwi.outputs.enabled == 'true'
        working-directory: dashboard
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium
      - name: Install Wokwi CLI
        if: steps.wokwi.outputs.enabled == 'true'
        run: |
          sudo wget -q -O /usr/local/bin/wokwi-cli https://github.com/wokwi/wokwi-cli/releases/latest/download/wokwi-cli-linuxstatic-x64
          sudo chmod +x /usr/local/bin/wokwi-cli
      - name: Run dashboard-to-Wokwi closed loop
        if: steps.wokwi.outputs.enabled == 'true'
        run: bash scripts/wokwi-closed-loop.sh
      - name: Upload closed-loop diagnostics
        if: always() && steps.wokwi.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wokwi-closed-loop-diagnostics
          path: |
            build/wokwi/closed-loop-*.log
            dashboard/test-results
          if-no-files-found: ignore
      - name: Report optional closed-loop test
        if: steps.wokwi.outputs.enabled != 'true'
        run: echo "Closed-loop Wokwi test skipped; configure WOKWI_CLI_TOKEN to enable it."

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit
      - run: pip-audit -r backend/requirements-dev.txt -r mock_device/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - run: pnpm install --frozen-lockfile
        working-directory: dashboard
      - run: pnpm audit
        working-directory: dashboard

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
      - run: docker compose --env-file .env.production.example -f docker-compose.production.yml config --quiet
      - run: sh -n deploy/mosquitto/init-passwords.sh
      - name: Build and smoke-test Compose stack
        run: bash scripts/compose-smoke.sh
