name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r backend/requirements-dev.txt -r mock_device/requirements.txt
      - run: ruff format --check .
      - run: ruff check .
      - run: mypy
      - run: pytest --cov-report=xml
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-arduino-cli@v2
      - run: arduino-cli core update-index
      - run: arduino-cli core install esp32:esp32
      - run: arduino-cli lib install ArduinoJson DallasTemperature OneWire PubSubClient
      - name: Compile plaintext Wokwi firmware
        run: arduino-cli compile --fqbn esp32:esp32:esp32 --build-path /tmp/esp32-plaintext firmware/esp32_mqtt
      - name: Compile verified-TLS physical firmware
        run: |
          cp firmware/esp32_mqtt/feeder_secrets.example.h firmware/esp32_mqtt/feeder_secrets.h
          arduino-cli compile --fqbn esp32:esp32:esp32 --build-path /tmp/esp32-tls firmware/esp32_mqtt

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit
      - run: pip-audit -r backend/requirements-dev.txt -r mock_device/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - run: pnpm install --frozen-lockfile
        working-directory: dashboard
      - run: pnpm audit
        working-directory: dashboard

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
      - run: docker compose --env-file .env.production.example -f docker-compose.production.yml config --quiet
      - run: sh -n deploy/mosquitto/init-passwords.sh
      - name: Build and smoke-test Compose stack
        run: bash scripts/compose-smoke.sh
