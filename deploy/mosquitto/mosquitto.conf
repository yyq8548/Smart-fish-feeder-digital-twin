listener 1883 0.0.0.0
protocol mqtt

# TLS is terminated by Traefik on public port 8883. This listener is reachable
# only on the internal Docker network and still requires broker credentials.
allow_anonymous false
password_file /mosquitto/secrets/passwords
acl_file /mosquitto/config/acl

persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db
autosave_interval 60

sys_interval 1
max_connections 100
max_keepalive 120
max_inflight_messages 20
max_queued_messages 1000
message_size_limit 262144

log_dest stdout
log_type error
log_type warning
log_type notice
connection_messages true
